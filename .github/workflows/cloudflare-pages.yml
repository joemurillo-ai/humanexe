name: Deploy to Cloudflare Pages

on:
  # Manual-only by default. Prefer Cloudflare Pages Git integration for
  # production deploys, or add the required secrets and run this explicitly.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy HUMAN.EXE
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=humanexe-ai --branch=main
